<svg width="400" height="80" viewBox="0 0 400 80" xmlns="http://www.w3.org/2000/svg">
  <!-- 3x3 grid mark — centred vertically in 80px viewBox -->
  <g transform="translate(0,6)">
    <g stroke="#000000" fill="none">
      <rect x="0"  y="0"  width="22" height="22" stroke-width="0.7" opacity="0.28"/>
      <rect x="24" y="0"  width="22" height="22" stroke-width="0.7" opacity="0.28"/>
      <rect x="48" y="0"  width="22" height="22" stroke-width="0.7" opacity="0.28"/>
      <rect x="0"  y="24" width="22" height="22" stroke-width="0.7" opacity="0.28"/>
      <rect x="24" y="24" width="22" height="22" stroke-width="1.8" fill="#000000"/>
      <rect x="48" y="24" width="22" height="22" stroke-width="0.7" opacity="0.28"/>
      <rect x="0"  y="48" width="22" height="22" stroke-width="0.7" opacity="0.28"/>
      <rect x="24" y="48" width="22" height="22" stroke-width="0.7" opacity="0.28"/>
      <rect x="48" y="48" width="22" height="22" stroke-width="0.7" opacity="0.28"/>
    </g>
  </g>

  <!-- Wordmark: "Invariant" — system serif with embedded font-face fallback -->
  <text
    x="88"
    y="46"
    font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
    font-size="32"
    font-weight="400"
    letter-spacing="0.01em"
    fill="#000000"
  >Invariant</text>

  <!-- Tagline -->
  <text
    x="90"
    y="65"
    font-family="'JetBrains Mono', 'SF Mono', 'Menlo', 'Courier New', monospace"
    font-size="9.5"
    font-weight="400"
    letter-spacing="0.18em"
    fill="#000000"
    opacity="0.45"
  >LICENSING LANGUAGE MODELS</text>
</svg>
